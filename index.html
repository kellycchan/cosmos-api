<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC小宇宙</title>
    <style>
        :root {
            --color-0: #5c9cd9; --color-1: #7dbdbd; --color-2: #9b84b3; --color-3: #d1d1d1;
            --active-color: #5c9cd9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            /* 备用动态背景：解决背景图丢失导致的“丑” */
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
        }
        
        header { 
            position: fixed; top: 0; width: 100%; height: 120px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        h1 { font-size: 1.4rem; letter-spacing: 10px; text-shadow: 0 0 15px var(--active-color); margin-bottom: 10px; }
        .sync-info { font-size: 0.6rem; color: #666; display: flex; gap: 15px; text-transform: uppercase; }

        .container { 
            display: flex; height: 100vh; align-items: center; justify-content: center; 
            gap: 15px; padding: 10px; padding-top: 60px;
        }

        .side-nav { display: flex; flex-direction: column; gap: 10px; }
        .tab-btn { 
            width: 75px; height: 75px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            color: #555; display: flex; align-items: center; justify-content: center;
            writing-mode: vertical-rl; font-size: 0.75rem; letter-spacing: 2px; transition: 0.4s;
        }
        .tab-btn.active { color: #fff; border-color: var(--active-color); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px var(--active-color); }

        /* 核心窗体：加大尺寸，增强立体感 */
        .main-content {
            width: 75vw; max-width: 320px; height: 60vh; max-height: 500px;
            perspective: 1200px; 
            animation: cosmosRotate 12s infinite ease-in-out;
        }

        .display-screen {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px; height: 100%; width: 100%;
            border: 1px solid rgba(255,255,255,0.15);
            clip-path: polygon(12% 0%, 100% 5%, 100% 92%, 88% 100%, 0% 95%, 0% 8%);
            display: flex; flex-direction: column; justify-content: center;
        }

        .content-panel { 
            display: none; line-height: 1.8; font-size: 0.95rem; color: #eee;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .content-panel.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes cosmosRotate {
            0%, 100% { transform: rotateY(0deg) rotateX(0deg); }
            50% { transform: rotateY(20deg) rotateX(10deg); }
        }

        .highlight { color: var(--active-color); font-weight: bold; text-shadow: 0 0 8px var(--active-color); }
    </style>
</head>
<body>
    <header>
        <h1 id="title">KC小宇宙</h1>
        <div class="sync-info">
            <span id="sync-status">SYNCING...</span>
            <span id="sync-time">--:--:--</span>
        </div>
    </header>

    <div class="container">
        <nav class="side-nav">
            <div class="tab-btn active" onclick="switchPanel(0)" style="--c: var(--color-0)">诞生日</div>
            <div class="tab-btn" onclick="switchPanel(1)" style="--c: var(--color-1)">旋转燃料</div>
            <div class="tab-btn" onclick="switchPanel(2)" style="--c: var(--color-2)">照亮空间</div>
            <div class="tab-btn" onclick="switchPanel(3)" style="--c: var(--color-3)">终极进化</div>
        </nav>
        <main class="main-content">
            <div class="display-screen">
                <div class="content-panel active" id="panel-0">加载中...</div>
                <div class="content-panel" id="panel-1"></div>
                <div class="content-panel" id="panel-2"></div>
                <div class="content-panel" id="panel-3"></div>
            </div>
        </main>
    </div>

    <script>
        const DATA_URL = "data.json?t=" + new Date().getTime();
        const colors = ['#5c9cd9', '#7dbdbd', '#9b84b3', '#d1d1d1'];

        async function fetchCosmosData() {
            try {
                const response = await fetch(DATA_URL);
                const data = await response.json();
                data.forEach((item, index) => {
                    document.getElementById(`panel-${index}`).innerHTML = item.content;
                });
                document.getElementById('sync-status').innerText = "SYNC_STABLE";
            } catch (e) { document.getElementById('sync-status').innerText = "OFFLINE"; }
        }

        function switchPanel(index) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach((btn, i) => btn.classList.toggle('active', i === index));
            const panels = document.querySelectorAll('.content-panel');
            panels.forEach((p, i) => p.classList.toggle('active', i === index));
            document.documentElement.style.setProperty('--active-color', colors[index]);
        }

        setInterval(() => {
            document.getElementById('sync-time').innerText = new Date().toTimeString().split(' ')[0];
        }, 1000);

        window.onload = fetchCosmosData;
    </script>
</body>
</html>
