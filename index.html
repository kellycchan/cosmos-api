<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC宇宙-V17.0健壮版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 1. 彻底解决背景全黑：改用纯色背景 + 一个大光晕图片或多重背景兜底 */
        body { 
            background-color: #050a15; /* 强行给一个深蓝色底，绝不全黑 */
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
            height: 100vh; width: 100vw; 
            touch-action: none;
        }

        header { position: fixed; top: 0; left: 0; width: 100vw; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; background: linear-gradient(to bottom, #050a15, transparent); }
        h1 { font-size: 1.3rem; letter-spacing: 8px; text-shadow: 0 0 15px #5c9cd9; }
        .sync-info { font-size: 0.5rem; color: #555; margin-top: 5px; }
        
        .container { display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center; }
        
        /* 侧边栏 */
        .side-nav { position: absolute; left: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 30; }
        .tab-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #888; width: 45px; height: 70px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; border-radius: 10px; writing-mode: vertical-rl; }
        .tab-btn.active { color: #fff; border-color: #5c9cd9; background: rgba(92,156,217,0.3); }
        
        /* 屏幕框 */
        .display-screen { 
            background: rgba(0, 0, 0, 0.7); 
            border: 1px solid #222; 
            height: 480px; width: 310px; 
            border-radius: 20px; 
            overflow: visible !important; /* 彻底解决显示不全：允许内容溢出容器 */
            position: relative; 
        }
        
        #fuel-nebula { 
            position: absolute; top: 50%; left: 50%; 
            width: 1px; height: 1px; 
            transform-style: preserve-3d; 
            backface-visibility: hidden;
        }

        .star-item { 
            position: absolute; 
            white-space: nowrap; 
            font-weight: bold; 
            transform-origin: center;
            /* 解决显示不全的核心：去掉所有的裁剪可能 */
            overflow: visible;
        }
    </style>
</head>
<body>
    <header>
        <h1>KC小宇宙</h1>
        <div class="sync-info">V17.0 STABLE | <span id="sync-status">READY</span> | <span id="sync-time">00:00</span></div>
    </header>
    
    <div class="container" id="touch-area">
        <nav class="side-nav">
            <div class="tab-btn active">旋转燃料</div>
        </nav>
        <div class="display-screen">
            <div id="fuel-nebula"></div>
        </div>
    </div>

    <script>
        // 增加更暴力的 URL 参数，确保穿透任何缓存
        const getUrl = () => "https://raw.githubusercontent.com/kellycchan/cosmos-api/main/data.json?v=" + Math.random();
        const starColors = ['#5c9cd9', '#7dbdbd', '#9b84b3', '#ffcc80', '#ff8a80'];
        let remoteBooks = [];
        let stars = [];

        async function fetchCosmosData() {
            const statusTag = document.getElementById('sync-status');
            statusTag.innerText = "SYNC...";
            try {
                const res = await fetch(getUrl());
                const data = await res.json();
                if (data.readBooks) {
                    remoteBooks = data.readBooks;
                    initStars();
                }
                statusTag.innerText = "SYNC_OK";
            } catch (e) { statusTag.innerText = "ERROR"; }
        }

        function initStars() {
            const container = document.getElementById('fuel-nebula');
            container.innerHTML = '';
            stars = [];
            const count = remoteBooks.length;

            remoteBooks.forEach((book, i) => {
                const el = document.createElement('div');
                el.className = 'star-item';
                el.innerText = book.title;

                // --- 逻辑校准：强制去空格、强制转整型 ---
                const rawVal = String(book.uniqueness).replace(/[^0-9.]/g, ''); // 只保留数字和点
                const w = parseInt(rawVal, 10) || 5;

                let col;
                // 提高阈值，确保稀有
                if (w >= 20) col = "#ffffff";
                else if (w >= 16) col = "#ffd54f";
                else if (w >= 12) col = "#ff5252";
                else col = starColors[i % starColors.length];

                el.style.color = col;
                el.style.textShadow = `0 0 ${w/3}px ${col}`;
                // 略微调小字号，增加散开半径，物理性解决遮挡
                el.style.fontSize = (0.4 + w/55) + "rem";

                const phi = Math.acos(-1 + (2 * i) / count);
                const theta = Math.sqrt(count * Math.PI) * phi;
                const r = 145; 

                stars.push({
                    el: el,
                    x: r * Math.sin(phi) * Math.cos(theta),
                    y: r * Math.sin(phi) * Math.sin(theta),
                    z: r * Math.cos(phi),
                    v: (0.005 + (w * w) / 45000)
                });
                container.appendChild(el);
            });
        }

        function animate() {
            stars.forEach(s => {
                const cos = Math.cos(s.v);
                const sin = Math.sin(s.v);
                const x1 = s.x * cos - s.z * sin;
                const z1 = s.z * cos + s.x * sin;
                s.x = x1; s.z = z1;

                // 解决显示不全的核心：
                // 使用 translate3d 但绝对不让 Z 轴靠近观察者太近（防止被近剪裁平面切掉）
                const zFinal = s.z; 
                const scale = (zFinal + 145) / 290 * 0.6 + 0.4;
                const opacity = (zFinal + 145) / 290 * 0.7 + 0.3;
                
                s.el.style.transform = `translate3d(${s.x}px, ${s.y}px, ${zFinal}px) scale(${scale})`;
                s.el.style.opacity = opacity;
                s.el.style.zIndex = Math.floor(zFinal + 1000);
            });
            requestAnimationFrame(animate);
        }

        let sY = 0;
        document.getElementById('touch-area').addEventListener('touchstart', (e)=> sY = e.touches[0].pageY);
        document.getElementById('touch-area').addEventListener('touchend', (e)=>{
            if(e.changedTouches[0].pageY - sY > 100) fetchCosmosData();
        });

        setInterval(()=> document.getElementById('sync-time').innerText = new Date().toTimeString().substring(0,5), 1000);
        window.onload = () => { fetchCosmosData(); animate(); };
    </script>
</body>
</html>
