<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC宇宙-V20.3-LayoutTuned</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at center, #050c1a 0%, #000000 100%); color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        header { position: fixed; top: 0; left: 0; width: 100vw; padding-top: 15px; display: flex; flex-direction: column; align-items: center; z-index: 200; pointer-events: none; }
        h1 { font-size: 1.2rem; letter-spacing: 8px; text-shadow: 0 0 20px rgba(92, 156, 217, 0.4); text-transform: uppercase; opacity: 0.9; }
        .sync-info { font-size: 0.5rem; color: rgba(255, 255, 255, 0.3); margin-top: 5px; letter-spacing: 1px; }

        .top-nav { position: fixed; top: 75px; left: 0; width: 100vw; display: flex; justify-content: center; gap: 8px; padding: 0 10px; z-index: 210; pointer-events: auto; }
        .tab-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #666; flex: 1; max-width: 85px; height: 35px; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .tab-btn.active { color: #fff; border-color: rgba(92, 156, 217, 0.6); background: rgba(92, 156, 217, 0.2); box-shadow: 0 0 15px rgba(92, 156, 217, 0.2); }

        .viewport { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; perspective: 1200px; z-index: 10; display: none; }
        .viewport.active { display: block; }
        #fuel-intro { position: absolute; top: 140px; left: 50%; transform: translateX(-50%); width: 85%; text-align: center; color: rgba(255,255,255,0.4); font-size: 0.75rem; line-height: 1.5; z-index: 5; pointer-events: none; }
        #fuel-nebula { position: absolute; top: 55%; left: 50%; transform-style: preserve-3d; }
        
        /* 调优内容面板：去掉顶部 padding 让地图上移 */
        .content-panel { position: fixed; top: 58%; left: 50%; transform: translate(-50%, -50%); width: 88vw; max-height: 65vh; background: transparent; padding: 0 10px 10px 10px; overflow-y: auto; display: none; z-index: 150; color: #aaa; line-height: 1.8; font-size: 0.95rem; }
        .content-panel.active { display: block; }
        
        /* 调优地图盒子：扩大高度，负 margin 上提 */
        #map-box { position: relative; width: 110%; left: -5%; height: 400px; margin-top: -25px; display: flex; justify-content: center; align-items: center; }
        #china-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 8px rgba(92, 156, 217, 0.3)); }
        /* 搜索这个名称，如果没有就直接贴在 #china-svg 下面 */
        .map-outline { 
            stroke: rgba(92, 156, 217, 0.5); /* 更有科技感的幽灵蓝 */
            stroke-width: 1.5; 
            fill: rgba(92, 156, 217, 0.08); /* 淡淡的填充色，让轮廓有实体感 */
            transition: 0.3s;
        }
    /*.map-outline { stroke: rgba(255,255,255,0.25); stroke-width: 1.5; fill: rgba(92, 156, 217, 0.05); }*/
        .map-dot { fill: hsl(50, 95%, 75%); cursor: pointer; stroke: rgba(255, 255, 255, 0.15); stroke-width: 5px; }
        .map-dot.active { fill: #fff; r: 12; filter: drop-shadow(0 0 15px #fff); }
        
        /* 紧凑化笔记面板 */
        #map-note { margin-top: 5px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.85rem; border: 1px dashed rgba(255,255,255,0.1); min-height: 60px; color: #ddd; }

        .star-item { position: absolute; white-space: nowrap; font-weight: bold; transform-origin: center; pointer-events: none; }
        footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 0.4rem; color: rgba(255, 255, 255, 0.15); letter-spacing: 1px; pointer-events: none; }
        .highlight { color: #5c9cd9; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>KC小宇宙</h1>
        <div class="sync-info">STATION_V20.3 | <span id="sync-status">READY</span> | <span id="sync-time">00:00</span></div>
    </header>

    <nav class="top-nav">
        <div class="tab-btn active" onclick="switchPanel(0)">诞生日</div>
        <div class="tab-btn" onclick="switchPanel(1)">旋转燃料</div>
        <div class="tab-btn" onclick="switchPanel(2)">照亮空间</div>
        <div class="tab-btn" onclick="switchPanel(3)">终极进化</div>
    </nav>

    <div class="viewport" id="viewport-universe">
        <div id="fuel-intro"></div>
        <div id="fuel-nebula"></div>
    </div>

    <div id="panels-container">
        <div class="content-panel" id="panel-0"></div>
        <div class="content-panel" id="panel-2">
            <div id="map-box">
                <svg id="china-svg" viewBox="0 0 1000 800">
                    <path class="map-outline" d="M820,135 L835,145 L860,135 L885,160 L895,200 L885,240 L895,270 L870,300 L880,330 L855,360 L865,400 L840,440 L850,490 L830,530 L845,570 L820,620 L790,650 L780,690 L795,725 L770,720 L740,700 L710,720 L680,705 L650,715 L620,700 L580,710 L540,690 L500,700 L460,680 L420,690 L380,670 L340,680 L300,660 L260,670 L220,640 L180,650 L140,630 L100,620 L80,580 L95,540 L70,500 L85,460 L60,420 L75,380 L100,340 L130,310 L170,290 L210,270 L250,260 L290,250 L330,230 L370,220 L410,210 L450,220 L490,200 L530,210 L570,190 L610,180 L650,170 L690,160 L730,150 L770,140 Z" />
                </svg>
            </div>
            <div id="map-note">点击星点，照亮每一处足迹。</div>
        </div>
        <div class="content-panel" id="panel-3"></div>
    </div>

    <footer>KC_COSMOS_V20.3_FINAL_LAYOUT</footer>

    <script>
        const getUrl = () => "https://raw.githubusercontent.com/kellycchan/cosmos-api/main/data.json?v=" + Date.now();
        const morandiPool = ['hsl(190, 20%, 60%)', 'hsl(280, 15%, 65%)', 'hsl(150, 15%, 60%)', 'hsl(35, 25%, 60%)', 'hsl(210, 20%, 65%)', 'hsl(0, 15%, 65%)'];
        let remoteBooks = []; let stars = [];

        async function fetchCosmosData() {
            const statusTag = document.getElementById('sync-status');
            statusTag.innerText = "SYNC...";
            try {
                const res = await fetch(getUrl());
                const data = await res.json();
                if (data.panels) {
                    data.panels.forEach((item, idx) => {
                        const p = document.getElementById(`panel-${idx}`);
                        if (!p) return;
                        if (idx === 1) document.getElementById('fuel-intro').innerHTML = item.content;
                        else if (idx === 2) { if (item.footprints) drawMap(item.footprints); } 
                        else p.innerHTML = item.content;
                    });
                }
                if (data.readBooks) { remoteBooks = data.readBooks; initStars(); }
                statusTag.innerText = "OK";
            } catch (e) { statusTag.innerText = "OFFLINE"; }
        }

        function drawMap(points) {
            const svg = document.getElementById('china-svg');
            const outline = svg.querySelector('.map-outline').getAttribute('d');
            let content = `<path class="map-outline" d="${outline}" />`;
            points.forEach((pt) => {
                // 视觉点：比之前大，且带呼吸动画
                content += `<circle class="map-dot" cx="${pt.x}" cy="${pt.y}" r="10" pointer-events="none">
                    <animate attributeName="r" values="9;13;9" dur="2.5s" repeatCount="indefinite" />
                    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite" />
                </circle>`;
                // 强力点击域：30像素半径的隐形圆，极大地提升手感
                content += `<circle cx="${pt.x}" cy="${pt.y}" r="30" fill="transparent" style="cursor:pointer" onclick="showNote('${pt.note}', this.previousSibling)"></circle>`;
            });
            svg.innerHTML = content;
        }

        window.showNote = (note, el) => {
            if (navigator.vibrate) navigator.vibrate(15); 
            document.querySelectorAll('.map-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('map-note').innerHTML = `<span class="highlight">LOCATE</span> <br> ${note}`;
        };

        function initStars() {
            const container = document.getElementById('fuel-nebula');
            container.innerHTML = ''; stars = [];
            const count = remoteBooks.length;
            const r = Math.max(window.innerWidth, window.innerHeight) * 0.45;
            const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            const speedBoost = isMobile ? 2.5 : 1.0; 
            remoteBooks.forEach((book, i) => {
                const el = document.createElement('div');
                el.className = 'star-item'; el.innerText = book.title;
                let val = String(book.uniqueness).replace(/[^0-9.]/g, '');
                const w = parseFloat(val) || 5;
                let col = w >= 20 ? "hsl(0, 0%, 95%)" : (w >= 10 ? "hsl(210, 30%, 65%)" : morandiPool[i % morandiPool.length]);
                el.style.color = col;
                const lenRatio = book.title.length > 8 ? 0.7 : 1; 
                el.style.fontSize = `${(0.38 + w/35) * lenRatio}rem`;
                const phi = Math.acos(-1 + (2 * i) / count);
                const theta = Math.sqrt(count * Math.PI) * phi;
                stars.push({
                    el: el, x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi),
                    v: (0.022 + (w * w) / 8000) * speedBoost 
                });
                container.appendChild(el);
            });
        }

        function animate() {
            stars.forEach((s, idx) => {
                const tilt = Math.sin(idx) * 0.35;
                const cosV = Math.cos(s.v); const sinV = Math.sin(s.v);
                const x1 = s.x * cosV - s.z * sinV;
                const z1 = s.z * cosV + s.x * sinV;
                const y1 = s.y + (s.x * sinV) * tilt;
                s.x = x1; s.z = z1; s.y = y1 * 0.998;
                const scale = (s.z + 200) / 450 * 0.6 + 0.4;
                const opacity = (s.z + 200) / 450 * 0.7 + 0.2;
                s.el.style.transform = `translate3d(${s.x.toFixed(1)}px, ${s.y.toFixed(1)}px, ${s.z.toFixed(1)}px) scale(${scale.toFixed(2)})`;
                s.el.style.opacity = opacity;
                s.el.style.zIndex = Math.floor(s.z + 200);
            });
            requestAnimationFrame(animate);
        }

        function switchPanel(idx) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            const universe = document.getElementById('viewport-universe');
            if (idx === 1) { universe.style.display = 'block'; setTimeout(() => universe.classList.add('active'), 10); } 
            else { 
                universe.classList.remove('active'); universe.style.display = 'none'; 
                const p = document.getElementById(`panel-${idx}`); if (p) p.classList.add('active'); 
            }
        }

        window.onload = () => { fetchCosmosData(); animate(); switchPanel(1); };
        let sY = 0; window.addEventListener('touchstart', (e)=> sY = e.touches[0].pageY);
        window.addEventListener('touchend', (e)=>{ if(e.changedTouches[0].pageY - sY > 120) fetchCosmosData(); });
        setInterval(()=> { document.getElementById('sync-time').innerText = new Date().toTimeString().substring(0,5); }, 1000);
    </script>
</body>
</html>
