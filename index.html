<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC小宇宙-绚丽星空版</title>
    <style>
        :root { --color-0: #5c9cd9; --color-1: #7dbdbd; --color-2: #9b84b3; --color-3: #d1d1d1; --bg-black: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-black); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        .bg-overlay { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; z-index: -3; background-image: url('background.jpg'); background-size: cover; background-position: center; filter: blur(25px) brightness(15%); }
        .space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 50% 50%, rgba(20, 30, 50, 0.3) 0%, rgba(0, 0, 0, 1) 100%); }
        header { position: fixed; top: 0; left: 0; width: 100vw; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        h1 { font-size: 1.4rem; letter-spacing: 10px; color: #fff; text-shadow: 0 0 20px var(--active-color, var(--color-0)); text-transform: uppercase; margin-bottom: 8px; }
        .sync-info { font-size: 0.5rem; color: #444; letter-spacing: 2px; }
        .container { display: flex; height: 100vh; width: 100vw; padding: 20px; gap: 10px; align-items: center; justify-content: center; transform: translateY(20px); }
        .side-nav { display: flex; flex-direction: column; width: 80px; gap: 12px; z-index: 10; }
        .tab-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); color: #444; width: 65px; height: 80px; font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 18px; writing-mode: vertical-rl; letter-spacing: 4px; transition: 0.4s; }
        .tab-btn.active { color: #fff; border-color: var(--active-color); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px var(--active-color); }
        .main-content { width: 300px; height: 480px; position: relative; perspective: 1000px; }
        .display-screen { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px); padding: 30px 20px; height: 100%; width: 100%; position: relative; clip-path: polygon(8% 0%, 100% 5%, 100% 95%, 92% 100%, 0% 95%, 0% 8%); border: 1px solid rgba(255,255,255,0.08); overflow: hidden; }
        .content-panel { display: none; height: 100%; overflow-y: auto; scrollbar-width: none; line-height: 2.2; font-size: 0.9rem; color: #ccc; }
        .content-panel.active { display: block; }
        #fuel-nebula { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-style: preserve-3d; }
        .star-item { position: absolute; cursor: pointer; font-weight: bold; white-space: nowrap; transition: color 0.4s, text-shadow 0.4s; will-change: transform, opacity; transform-origin: center; }
        footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 0.4rem; opacity: 0.2; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div><div class="space-bg"></div>
    <header id="app-header">
        <h1>KC小宇宙</h1>
        <div class="sync-info"><span>DIM: 11D</span> | <span id="sync-status">STATUS: READY</span> | <span id="sync-time">00:00</span></div>
    </header>
    <div class="container" id="touch-area">
        <nav class="side-nav">
            <div class="tab-btn active" onclick="switchPanel(0)">诞生日</div>
            <div class="tab-btn" onclick="switchPanel(1)">旋转燃料</div>
            <div class="tab-btn" onclick="switchPanel(2)">照亮空间</div>
            <div class="tab-btn" onclick="switchPanel(3)">终极进化</div>
        </nav>
        <main class="main-content">
            <div class="display-screen">
                <div class="content-panel active" id="panel-0"></div>
                <div class="content-panel" id="panel-1"><div id="fuel-nebula"></div></div>
                <div class="content-panel" id="panel-2"></div>
                <div class="content-panel" id="panel-3"></div>
            </div>
        </main>
    </div>
    <footer>V15.6 SPECTRUM_ENGINE</footer>

    <script>
        const getUrl = () => "https://raw.githubusercontent.com/kellycchan/cosmos-api/main/data.json?v=" + Date.now();
        const colors = ['#5c9cd9', '#7dbdbd', '#9b84b3', '#d1d1d1'];
        // 扩展调色盘：加入黄、红、橙
        const starColors = ['#ffcc80', '#ff8a80', '#7dbdbd', '#9b84b3', '#d1d1d1', '#ffd54f', '#ff5252'];
        let remoteBooks = [];
        let stars = [];

        async function fetchCosmosData() {
            const statusTag = document.getElementById('sync-status');
            statusTag.innerText = "STATUS: SYNCING...";
            try {
                const response = await fetch(getUrl());
                const data = await response.json();
                if (data.panels) {
                    data.panels.forEach((item, index) => {
                        const p = document.getElementById(`panel-${index}`);
                        if (p && index !== 1) p.innerHTML = item.content;
                    });
                }
                if (data.readBooks) { remoteBooks = data.readBooks; initStars(); }
                statusTag.innerText = "STATUS: SYNC_STABLE";
            } catch (e) { statusTag.innerText = "STATUS: OFFLINE"; }
        }

        function initStars() {
            const container = document.getElementById('fuel-nebula');
            container.innerHTML = '';
            stars = [];
            const count = remoteBooks.length;
            remoteBooks.forEach((book, i) => {
                const item = document.createElement('div');
                item.className = 'star-item';
                item.innerText = book.title;
                const weight = book.uniqueness || 5;
                
                // 颜色逻辑增强
                let color;
                if (weight >= 18) { color = "#ffffff"; } // 顶级权重：纯白
                else if (weight >= 14) { color = "#ffd54f"; } // 高权重：琥珀黄
                else if (weight >= 10) { color = "#ff5252"; } // 中高权重：珊瑚红
                else { color = starColors[i % starColors.length]; } // 其他随机

                item.style.color = color;
                item.style.textShadow = `0 0 ${8+weight/2}px ${color}`;
                item.style.fontSize = `${0.5 + weight/40}rem`;

                const phi = Math.acos(-1 + (2 * i) / count);
                const theta = Math.sqrt(count * Math.PI) * phi;
                const radius = 160; // 稍微拉大半径

                stars.push({
                    el: item,
                    x: radius * Math.sin(phi) * Math.cos(theta),
                    y: radius * Math.sin(phi) * Math.sin(theta),
                    z: radius * Math.cos(phi),
                    speed: (0.006 + weight / 1200)
                });
                container.appendChild(item);
            });
        }

        function animate() {
            stars.forEach(s => {
                const cos = Math.cos(s.speed);
                const sin = Math.sin(s.speed);
                const x1 = s.x * cos - s.z * sin;
                const z1 = s.z * cos + s.x * sin;
                s.x = x1;
                s.z = z1;

                const scale = 1000 / (1000 - s.z);
                const alpha = (s.z + 160) / 320 + 0.2;
                s.el.style.transform = `translate3d(${s.x * scale}px, ${s.y * scale}px, 0) scale(${scale})`;
                s.el.style.opacity = alpha;
                s.el.style.zIndex = Math.floor(s.z + 160);
            });
            requestAnimationFrame(animate);
        }

        function switchPanel(index) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
            document.querySelectorAll('.content-panel').forEach((p, i) => p.classList.toggle('active', i === index));
            document.documentElement.style.setProperty('--active-color', colors[index]);
            if(index === 1) initStars();
        }

        let startY = 0;
        document.getElementById('touch-area').addEventListener('touchstart', (e) => startY = e.touches[0].pageY);
        document.getElementById('touch-area').addEventListener('touchend', (e) => {
            if (e.changedTouches[0].pageY - startY > 150) fetchCosmosData();
        });

        setInterval(() => { document.getElementById('sync-time').innerText = new Date().toTimeString().substring(0,5); }, 1000);
        window.onload = () => { fetchCosmosData(); animate(); };
    </script>
</body>
</html>
