<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC宇宙-V16.9最终版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        .space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a1b3d 0%, #000000 100%); }
        header { position: fixed; top: 0; left: 0; width: 100vw; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        h1 { font-size: 1.4rem; letter-spacing: 10px; text-shadow: 0 0 20px #5c9cd9; text-transform: uppercase; }
        .sync-info { font-size: 0.5rem; color: #444; margin-top: 8px; letter-spacing: 2px; }
        .container { display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center; transform: translateY(20px); }
        .side-nav { position: absolute; left: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .tab-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #555; width: 60px; height: 85px; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; border-radius: 20px; writing-mode: vertical-rl; transition: 0.4s; }
        .tab-btn.active { color: #fff; border-color: #5c9cd9; background: rgba(92, 156, 217, 0.2); box-shadow: 0 0 15px #5c9cd9; }
        .main-content { width: 300px; height: 480px; position: relative; perspective: 1200px; }
        .display-screen { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); height: 100%; width: 100%; border-radius: 20px; overflow: hidden; position: relative; }
        #fuel-nebula { position: absolute; top: 50%; left: 50%; width: 1px; height: 1px; transform-style: preserve-3d; }
        .star-item { position: absolute; white-space: nowrap; font-weight: bold; transform-origin: center; pointer-events: none; transition: color 0.4s; }
        footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 0.4rem; opacity: 0.2; }
    </style>
</head>
<body>
    <div class="space-bg"></div>
    <header>
        <h1>KC小宇宙</h1>
        <div class="sync-info">CORE_DIM: 11D | <span id="sync-status">READY</span> | <span id="sync-time">00:00</span></div>
    </header>
    <div class="container" id="touch-area">
        <nav class="side-nav"><div class="tab-btn active">旋转燃料</div></nav>
        <main class="main-content"><div class="display-screen"><div id="fuel-nebula"></div></div></main>
    </div>
    <footer>V16.9 ULTIMATE</footer>

    <script>
        const getUrl = () => "https://raw.githubusercontent.com/kellycchan/cosmos-api/main/data.json?v=" + Date.now();
        const brightPool = ['#a0e9ff', '#ffb7ff', '#98ff98', '#ffcc80', '#e0f7fa', '#81d8d0'];
        let remoteBooks = [];
        let stars = [];

        async function fetchCosmosData() {
            const statusTag = document.getElementById('sync-status');
            statusTag.innerText = "SYNC...";
            try {
                const res = await fetch(getUrl());
                const data = await res.json();
                if (data.readBooks) { remoteBooks = data.readBooks; initStars(); }
                statusTag.innerText = "SYNC_OK";
            } catch (e) { statusTag.innerText = "OFFLINE"; }
        }

        function initStars() {
            const container = document.getElementById('fuel-nebula');
            container.innerHTML = '';
            stars = [];
            const count = remoteBooks.length;
            remoteBooks.forEach((book, i) => {
                const el = document.createElement('div');
                el.className = 'star-item';
                el.innerText = book.title;

                // 核心逻辑清洗：彻底消除“薛兆丰变白”的可能性
                let rawVal = String(book.uniqueness).replace(/[^0-9.]/g, ''); 
                const w = parseFloat(rawVal) || 5;
                
                let col;
                if (w >= 20) col = "#ffffff";
                else if (w >= 19) col = "#ffd54f";
                else if (w >= 18) col = "#ff5252";
                else if (w >= 10) col = "#5c9cd9";
                else col = brightPool[i % brightPool.length];

                el.style.color = col;
                el.style.textShadow = `0 0 ${4 + w/4}px ${col}`;
                const lenRatio = book.title.length > 8 ? 0.82 : 1;
                el.style.fontSize = `${(0.46 + w/50) * lenRatio}rem`;

                const phi = Math.acos(-1 + (2 * i) / count);
                const theta = Math.sqrt(count * Math.PI) * phi;
                const r = 160; 

                stars.push({
                    el: el,
                    x: r * Math.sin(phi) * Math.cos(theta),
                    y: r * Math.sin(phi) * Math.sin(theta),
                    z: r * Math.cos(phi),
                    v: (0.005 + (w * w) / 45000)
                });
                container.appendChild(el);
            });
        }

        function animate() {
            stars.forEach(s => {
                const cos = Math.cos(s.v);
                const sin = Math.sin(s.v);
                const x1 = s.x * cos - s.z * sin;
                const z1 = s.z * cos + s.x * sin;
                s.x = x1; s.z = z1;
                const scale = (s.z + 160) / 320 * 0.5 + 0.5;
                const opacity = (s.z + 160) / 320 * 0.7 + 0.3;
                s.el.style.transform = `translate3d(${s.x}px, ${s.y}px, ${s.z}px) scale(${scale})`;
                s.el.style.opacity = opacity;
                s.el.style.zIndex = Math.floor(s.z + 160);
            });
            requestAnimationFrame(animate);
        }

        let sY = 0;
        const touchArea = document.getElementById('touch-area');
        touchArea.addEventListener('touchstart', (e)=> sY = e.touches[0].pageY);
        touchArea.addEventListener('touchend', (e)=>{
            if(e.changedTouches[0].pageY - sY > 120) fetchCosmosData();
        });

        setInterval(()=> document.getElementById('sync-time').innerText = new Date().toTimeString().substring(0,5), 1000);
        window.onload = () => { fetchCosmosData(); animate(); };
    </script>
</body>
</html>
