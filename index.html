<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC小宇宙</title>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        :root {
            --color-0: #5c9cd9; --color-1: #7dbdbd; --color-2: #9b84b3; --color-3: #d1d1d1; --bg-black: #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-black); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        .bg-overlay { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; z-index: -3; background-image: url('background.jpg'); background-size: cover; background-position: center; filter: blur(18px) brightness(30%); transition: transform 0.3s ease-out; }
        .space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 50% 50%, rgba(20, 30, 50, 0.2) 0%, rgba(2, 2, 2, 0.6) 100%); }
        
        header { position: fixed; top: 0; left: 0; width: 100vw; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 20; padding-top: 20px; }
        h1 { font-size: 1.6rem; letter-spacing: 12px; color: #fff; text-shadow: 0 0 20px var(--active-color, var(--color-0)); text-transform: uppercase; transition: text-shadow 0.5s; margin-bottom: 25px; }
        
        .sync-info { font-size: 0.5rem; color: #444; letter-spacing: 3px; text-transform: uppercase; display: flex; gap: 20px; transition: color 0.5s; }
        .sync-active { color: var(--active-color, var(--color-0)); text-shadow: 0 0 10px var(--active-color, var(--color-0)); }
        
        .divider-line { width: 140px; height: 1px; background: rgba(255,255,255,0.05); margin-top: 12px; border-radius: 5px; transition: all 0.6s; }
        .divider-active { width: 200px; background: linear-gradient(90deg, transparent 0%, var(--active-color, var(--color-0)) 50%, transparent 100%); box-shadow: 0 0 10px var(--active-color, var(--color-0)); }

        .container { display: flex; height: 100vh; width: 100vw; padding: 20px; gap: 25px; align-items: center; justify-content: center; transform: translateY(40px); }
        
        .side-nav { display: flex; flex-direction: column; width: 95px; gap: 12px; z-index: 10; }
        .tab-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #666; width: 85px; height: 85px; font-size: 0.8rem; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.5s ease; border-radius: 20px; writing-mode: vertical-rl; letter-spacing: 4px; }
        .tab-btn.active { color: #fff; transform: translateX(8px) scale(1.05); border-color: var(--active-color); background: rgba(255,255,255,0.1); }

        .main-content { width: 280px; height: 430px; position: relative; perspective: 800px; animation: cosmosRotate 10s infinite ease-in-out; }
        .display-screen { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(25px); padding: 35px 25px; height: 100%; width: 100%; position: relative; overflow: hidden; clip-path: polygon(10% 0%, 100% 8%, 100% 90%, 90% 100%, 0% 92%, 0% 12%); border: 1px solid rgba(255,255,255,0.08); transition: all 0.6s; }

        .content-panel { display: none; animation: softIn 0.8s ease; line-height: 2.2; font-size: 0.92rem; color: #ddd; position: relative; z-index: 1; height: 100%; }
        .content-panel.active { display: block; }

        /* 3D星云容器 */
        #fuel-nebula { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; }
        .star-item { position: absolute; cursor: pointer; color: #7dbdbd; font-family: monospace; font-weight: bold; text-shadow: 0 0 5px #7dbdbd; white-space: nowrap; transition: 0.3s; }
        .star-item:hover { color: #fff; text-shadow: 0 0 15px #fff; }

        @keyframes softIn { from { opacity: 0; transform: translateZ(50px); } to { opacity: 1; transform: translateZ(0); } }
        @keyframes cosmosRotate {
            0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
            50% { transform: translateY(10px) rotateX(5deg) rotateY(-5deg); }
        }
        @keyframes fuelCollapse { to { transform: translate3d(0,0,-500px) scale(0); opacity: 0; } }
        .collapsing { animation: fuelCollapse 0.6s forwards !important; }

        footer { position: absolute; bottom: -45px; right: 0; font-size: 0.5rem; opacity: 0.2; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="bg-overlay" id="background"></div>
    <div class="space-bg"></div>
    
    <header>
        <h1 id="title">KC小宇宙</h1>
        <div class="sync-info" id="sync-info">
            <span>DIM: 11D</span>
            <span id="sync-status">STATUS: INIT...</span>
            <span>VECTOR: <span id="sync-time">--:--:--</span></span>
        </div>
        <div class="divider-line" id="divider"></div>
    </header>

    <div class="container">
        <nav class="side-nav">
            <div class="tab-btn active" onclick="switchPanel(0)">诞生日</div>
            <div class="tab-btn" onclick="switchPanel(1)">旋转燃料</div>
            <div class="tab-btn" onclick="switchPanel(2)">照亮空间</div>
            <div class="tab-btn" onclick="switchPanel(3)">终极进化</div>
        </nav>
        <main class="main-content">
            <div class="display-screen" id="screen">
                <div class="content-panel active" id="panel-0">> 正在同步节点...</div>
                <div class="content-panel" id="panel-1"><div id="fuel-nebula"></div></div>
                <div class="content-panel" id="panel-2">> 同步中...</div>
                <div class="content-panel" id="panel-3">> 同步中...</div>
            </div>
            <footer>CORE // K_STATION_V10.2</footer>
        </main>
    </div>

    <script>
        const DATA_URL = "https://raw.githubusercontent.com/kellycchan/cosmos-api/main/data.json?t=" + new Date().getTime();
        const colors = ['#5c9cd9', '#7dbdbd', '#9b84b3', '#d1d1d1'];
        let remoteBooks = [];

        async function fetchCosmosData() {
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error('Offline');
                const data = await response.json();
                
                // 核心修复：按对象格式读取 panels
                if (data.panels) {
                    data.panels.forEach((item, index) => {
                        const panel = document.getElementById(`panel-${index}`);
                        if (panel && index !== 1) panel.innerHTML = item.content;
                    });
                }
                
                if (data.readBooks) {
                    remoteBooks = data.readBooks;
                    if(document.querySelector('.tab-btn.active').innerText.includes('燃料')) renderFuelNebula();
                }
                
                document.getElementById('sync-status').innerText = "STATUS: SYNC_STABLE";
            } catch (error) {
                console.error("同步失败:", error);
                document.getElementById('sync-status').innerText = "STATUS: LOCAL_MODE";
            }
        }

        function renderFuelNebula() {
            const container = document.getElementById('fuel-nebula');
            if(!container || remoteBooks.length === 0) return;
            container.innerHTML = '';
            remoteBooks.forEach(book => {
                const item = document.createElement('div');
                item.className = 'star-item';
                item.innerText = book.title;
                const z = Math.random() * 400 - 200, x = (Math.random() - 0.5) * 250, y = (Math.random() - 0.5) * 350;
                item.style.transform = `translate3d(${x}px, ${y}px, ${z}px) scale(${(book.uniqueness/10)+0.4})`;
                item.style.opacity = (z + 300) / 600;
                item.onclick = (e) => { e.stopPropagation(); item.classList.add('collapsing'); setTimeout(() => item.remove(), 600); };
                container.appendChild(item);
            });
        }

        function switchPanel(index) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
            document.querySelectorAll('.content-panel').forEach((panel, i) => panel.classList.toggle('active', i === index));
            document.documentElement.style.setProperty('--active-color', colors[index]);
            
            const divider = document.getElementById('divider');
            divider.classList.remove('divider-active');
            void divider.offsetWidth;
            divider.classList.add('divider-active');

            if(index === 1) renderFuelNebula();
        }

        window.onload = () => {
            fetchCosmosData();
            setInterval(() => {
                document.getElementById('sync-time').innerText = new Date().toTimeString().split(' ')[0];
            }, 1000);
        };
    </script>
</body>
</html>
