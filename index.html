<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC小宇宙</title>
    <style>
        :root { --color-0: #5c9cd9; --color-1: #7dbdbd; --color-2: #9b84b3; --color-3: #d1d1d1; --bg-black: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-black); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; min-height: 100vh; width: 100vw; }
        
        .bg-overlay { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; z-index: -3; background-image: url('background.jpg'); background-size: cover; background-position: center; filter: blur(25px) brightness(20%); }
        .space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 70% 70%, rgba(20, 30, 50, 0.4) 0%, rgba(0, 0, 0, 1) 100%); }
        
        header { position: fixed; top: 0; left: 0; width: 100vw; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 20; background: linear-gradient(to bottom, black, transparent); }
        h1 { font-size: 1.4rem; letter-spacing: 10px; color: #fff; text-shadow: 0 0 20px var(--active-color, var(--color-0)); text-transform: uppercase; }
        .sync-info { font-size: 0.5rem; color: #444; letter-spacing: 2px; display: flex; gap: 15px; margin-top: 10px; }
        .divider-active { width: 180px; height: 1px; background: linear-gradient(90deg, transparent, var(--active-color), transparent); margin-top: 8px; }

        .container { display: flex; padding-top: 120px; padding-bottom: 50px; width: 100vw; min-height: 100vh; gap: 15px; justify-content: center; }
        .side-nav { position: sticky; top: 130px; display: flex; flex-direction: column; width: 70px; gap: 12px; height: fit-content; z-index: 10; }
        .tab-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); color: #444; width: 65px; height: 65px; font-size: 0.7rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 15px; writing-mode: vertical-rl; letter-spacing: 2px; transition: all 0.4s; }
        .tab-btn.active { color: #fff; border-color: var(--active-color); background: rgba(255,255,255,0.08); box-shadow: 0 0 15px var(--active-color); }

        .main-content { width: 280px; min-height: 500px; position: relative; perspective: 1000px; }
        .display-screen { 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); 
            padding: 30px 20px; width: 100%; min-height: 500px; position: relative; 
            clip-path: polygon(5% 0%, 100% 2%, 100% 98%, 0% 100%, 0% 5%);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .content-panel { display: none; line-height: 2.2; font-size: 0.9rem; color: #bbb; }
        .content-panel.active { display: block; animation: panelFade 0.5s ease forwards; }

        /* 星云：原点微调，扩大范围 */
        #fuel-nebula { 
            position: absolute; top: 40%; left: 45%; 
            width: 100%; height: 100%; 
            transform-style: preserve-3d;
        }
        .star-item { 
            position: absolute; cursor: pointer; color: #7dbdbd; font-family: monospace; 
            font-weight: bold; text-shadow: 0 0 8px #7dbdbd; white-space: nowrap; 
            transform: translate(-50%, -50%); transition: all 0.5s ease;
        }

        @keyframes panelFade { from { opacity: 0; transform: translateZ(-50px); } to { opacity: 1; transform: translateZ(0); } }
        footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 0.5rem; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="space-bg"></div>
    <header>
        <h1 id="title">KC小宇宙</h1>
        <div class="sync-info"><span>DIM: 11D</span><span id="sync-status">STATUS: SYNC_STABLE</span><span>VECTOR: <span id="sync-time">--:--</span></span></div>
        <div id="divider" class="divider-active"></div>
    </header>
    <div class="container">
        <nav class="side-nav">
            <div class="tab-btn active" onclick="switchPanel(0)">诞生日</div>
            <div class="tab-btn" onclick="switchPanel(1)">旋转燃料</div>
            <div class="tab-btn" onclick="switchPanel(2)">照亮空间</div>
            <div class="tab-btn" onclick="switchPanel(3)">终极进化</div>
        </nav>
        <main class="main-content">
            <div class="display-screen">
                <div class="content-panel active" id="panel-0"></div>
                <div class="content-panel" id="panel-1" style="overflow:visible;"><div id="fuel-nebula"></div></div>
                <div class="content-panel" id="panel-2"></div>
                <div class="content-panel" id="panel-3"></div>
            </div>
        </main>
    </div>
    <footer>CORE // K_STATION_V12.0</footer>

    <script>
        const DATA_URL = "https://raw.githubusercontent.com/kellycchan/cosmos-api/main/data.json?update=" + new Date().getTime();
        const colors = ['#5c9cd9', '#7dbdbd', '#9b84b3', '#d1d1d1'];
        let remoteBooks = [];

        async function fetchCosmosData() {
            try {
                const response = await fetch(DATA_URL);
                const data = await response.json();
                if (data.panels) {
                    data.panels.forEach((item, index) => {
                        const p = document.getElementById(`panel-${index}`);
                        if (p && index !== 1) p.innerHTML = item.content;
                    });
                }
                if (data.readBooks) remoteBooks = data.readBooks;
                switchPanel(0);
            } catch (e) { console.error(e); }
        }

        function renderFuelNebula() {
            const container = document.getElementById('fuel-nebula');
            if(!container || remoteBooks.length === 0) return;
            container.innerHTML = '';
            
            remoteBooks.forEach((book, i) => {
                const item = document.createElement('div');
                item.className = 'star-item';
                item.innerText = book.title;
                
                // 【全空间散布算法】
                // 通过 i 的余数强制分布到不同方向
                const angle = (i / remoteBooks.length) * Math.PI * 2 + Math.random();
                const distMultiplier = i % 2 === 0 ? 1.5 : 0.8; // 交替远近
                const x = Math.cos(angle) * (120 * distMultiplier);
                const y = Math.sin(angle) * (180 * distMultiplier) + (i * 10); // 纵向拉伸，填补右下
                const z = Math.sin(i) * 300; 

                item.style.transform = `translate3d(${x}px, ${y}px, ${z}px) scale(${(z+400)/500})`;
                item.style.opacity = (z + 400) / 700;
                
                item.onclick = (e) => {
                    e.stopPropagation();
                    item.style.color = "#fff";
                    item.style.textShadow = "0 0 30px #fff";
                    item.style.fontSize = "1.2rem";
                };
                container.appendChild(item);
            });
        }

        function switchPanel(index) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
            document.querySelectorAll('.content-panel').forEach((p, i) => p.classList.toggle('active', i === index));
            document.documentElement.style.setProperty('--active-color', colors[index]);
            if(index === 1) setTimeout(renderFuelNebula, 50);
        }

        setInterval(() => { document.getElementById('sync-time').innerText = new Date().toTimeString().substring(0,5); }, 1000);
        window.onload = fetchCosmosData;
    </script>
</body>
</html>
